name: codown-dev

services:
  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codown}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-codown}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-codown} -d ${POSTGRES_DB:-codown}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─────────────────────────────────────────
  # Express API — hot-reload via nodemon+esbuild
  # ─────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: builder
    restart: unless-stopped
    working_dir: /app/server
    command: >
      sh -c "
        npx prisma@6.3.1 migrate deploy --schema=./prisma/schema.prisma &&
        pnpm run build &&
        (npx esbuild src/server.ts --bundle --platform=node --packages=external --outfile=dist/server.js --format=esm --watch=forever &) &&
        pnpm run dev:start
      "
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: ${SERVER_PORT:-5000}
      POSTGRES_USER: ${POSTGRES_USER:-codown}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-codown}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_HOST: db
      DATABASE_URL: postgresql://${POSTGRES_USER:-codown}:${POSTGRES_PASSWORD:-changeme}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-codown}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_jwt_access_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_jwt_refresh_secret}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
    ports:
      - "${SERVER_PORT:-5000}:${SERVER_PORT:-5000}"
    volumes:
      # Hot-reload: mount source + output so nodemon picks up esbuild changes
      - ./server/src:/app/server/src
      - ./server/dist:/app/server/dist
      # Mount prisma dir so schema changes & new migrations are picked up live
      - ./server/prisma:/app/server/prisma

  # ─────────────────────────────────────────
  # Vite dev server
  # ─────────────────────────────────────────
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      target: deps
    restart: unless-stopped
    working_dir: /app/client
    command: pnpm --filter client dev --host 0.0.0.0
    depends_on:
      - server
    environment:
      # Vite reads these at runtime in dev (not baked in like prod)
      VITE_API_URL: http://localhost:${SERVER_PORT:-5000}
      VITE_WS_URL: ws://localhost:${SERVER_PORT:-5000}
    ports:
      - "5173:5173"
    volumes:
      # Full src mount so Vite's HMR picks up all file changes
      - ./client/src:/app/client/src
      # Also mount public so asset changes are live
      - ./client/public:/app/client/public
      # index.html & config files (vite.config.ts, tsconfig.json, etc.)
      - ./client/index.html:/app/client/index.html
      - ./client/vite.config.ts:/app/client/vite.config.ts
      - ./client/tsconfig.json:/app/client/tsconfig.json

  # ─────────────────────────────────────────
  # Prisma Studio — visual DB browser
  # ─────────────────────────────────────────
  studio:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: builder
    restart: unless-stopped
    working_dir: /app/server
    command: npx prisma@6.3.1 studio --schema=./prisma/schema.prisma --port 5555 --browser none
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-codown}:${POSTGRES_PASSWORD:-changeme}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-codown}
    ports:
      - "5555:5555"
    profiles:
      - tools # opt-in: docker compose --profile tools up

volumes:
  postgres_data:
